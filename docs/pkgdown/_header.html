<style>
  .row > aside.col-md-3 {
    display: none !important;
  }

  .row > main.col-md-9 {
    flex: 0 0 100% !important;
    max-width: 100% !important;
    width: 100% !important;
  }
</style>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".row > aside.col-md-3").forEach(function (el) {
      el.remove();
    });
    document.querySelectorAll(".row > main.col-md-9").forEach(function (el) {
      el.classList.remove("col-md-9");
      el.classList.add("col-12");
      el.style.maxWidth = "100%";
      el.style.width = "100%";
      el.style.flex = "0 0 100%";
    });
  });
</script>
