<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="220" viewBox="0 0 980 220">
  <style>
    .box { fill: #ffffff; stroke: #111827; stroke-width: 2; rx: 14; ry: 14; }
    .txt { font-family: -apple-system, Segoe UI, Arial, sans-serif; font-size: 16px; fill: #111827; }
    .arrow { stroke: #111827; stroke-width: 2.5; marker-end: url(#m); }
    .small { font-size: 13px; fill: #374151; }
  </style>
  <defs>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#111827"/>
    </marker>
  </defs>

  <rect class="box" x="20" y="70" width="140" height="70"/>
  <text class="txt" x="90" y="102" text-anchor="middle">Inputs</text>
  <text class="small" x="90" y="124" text-anchor="middle">data + options</text>

  <rect class="box" x="190" y="70" width="150" height="70"/>
  <text class="txt" x="265" y="102" text-anchor="middle">Spec</text>
  <text class="small" x="265" y="124" text-anchor="middle">compile + validate</text>

  <rect class="box" x="370" y="70" width="160" height="70"/>
  <text class="txt" x="450" y="102" text-anchor="middle">Registry</text>
  <text class="small" x="450" y="124" text-anchor="middle">kernel + tail routing</text>

  <rect class="box" x="560" y="70" width="170" height="70"/>
  <text class="txt" x="645" y="102" text-anchor="middle">Bundle</text>
  <text class="small" x="645" y="124" text-anchor="middle">codegen + constants</text>

  <rect class="box" x="760" y="70" width="180" height="70"/>
  <text class="txt" x="850" y="102" text-anchor="middle">MCMC + Fit</text>
  <text class="small" x="850" y="124" text-anchor="middle">S3 predict/plot</text>

  <line class="arrow" x1="160" y1="105" x2="190" y2="105"/>
  <line class="arrow" x1="340" y1="105" x2="370" y2="105"/>
  <line class="arrow" x1="530" y1="105" x2="560" y2="105"/>
  <line class="arrow" x1="730" y1="105" x2="760" y2="105"/>

  <text class="small" x="490" y="185" text-anchor="middle">Causal pipeline wraps the same path with treatment/control arms + optional PS model</text>
</svg>
