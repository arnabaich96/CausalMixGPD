project:
  type: website
  output-dir: ../quarto
  render:
    - "**/*.qmd"
    - "!**/*.knit.md"
    - "!**/*.rmarkdown"

website:
  title: "CausalMixGPD"
  search: true
  navbar:
    background: "#0b1220"
    left:
      - text: Home
        href: index.qmd
      - text: Roadmaps
        menu:
          - text: Website roadmap
            href: roadmap.qmd
          - text: Package roadmap
            href: package-roadmap.qmd
      - text: Start
        menu:
          - text: Start Hub
            href: start/index.qmd
          - text: Roadmap
            href: start/roadmap.qmd
          - text: Usage Diagrams
            href: start/usage-diagrams.qmd
          - text: Start Here
            href: start/start-here.qmd
          - text: Basic Compile and Run
            href: start/basic-model-compile-run.qmd
          - text: Backends and Workflow
            href: start/backends-and-workflow.qmd
          - text: Troubleshooting
            href: start/troubleshooting.qmd
      - text: Tracks
        menu:
          - text: Quickstart
            href: tracks/quickstart.qmd
          - text: Modeling (1-arm)
            href: tracks/modeling.qmd
          - text: Causal
            href: tracks/causal.qmd
          - text: Clustering
            href: tracks/clustering.qmd
          - text: Kernels & tails
            href: tracks/kernels.qmd
          - text: Customization
            href: tracks/customization.qmd
      - text: Examples
        href: examples/index.qmd
      - text: Kernels
        href: kernels.qmd
      - text: Advanced
        href: advanced/index.qmd
      - text: Developers
        href: developers/index.qmd
      - text: Reference
        menu:
          - text: Reference hub
            href: reference.qmd
          - text: Function reference by job
            href: reference-by-action.qmd
      - text: News
        href: news.qmd
      - text: Cite
        href: cite.qmd
      - text: Coverage
        href: coverage.qmd
    right:
      - text: API Reference
        href: pkgdown/reference/index.html
      - icon: github
        href: "https://github.com/arnabaich96/CausalMixGPD"

format:
  html:
    page-layout: full
    theme: [cosmo, theme.scss]
    toc: false
    smooth-scroll: true
    link-external-newwindow: true
    include-after-body: _footer.html
    code-fold: true
    code-summary: "Code"
    mermaid:
      theme: dark

execute:
  enabled: true
  cache: true
  freeze: auto
  message: false
  warning: false
