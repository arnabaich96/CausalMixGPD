project:
  type: website
  output-dir: ../docs
  render:
    - "**/*.qmd"
    - "!**/*.knit.md"
    - "!**/*.rmarkdown"

website:
  title: "DPmixGPD"
  search: true
  navbar:
    left:
      - text: Home
        href: index.qmd
      - text: Start
        menu:
          - text: Start Hub
            href: start/index.qmd
          - text: Roadmap
            href: start/roadmap.qmd
          - text: Start Here
            href: start/start-here.qmd
          - text: Basic Compile and Run
            href: start/basic-model-compile-run.qmd
          - text: Backends and Workflow
            href: start/backends-and-workflow.qmd
          - text: Troubleshooting
            href: start/troubleshooting.qmd
      - text: Examples
        href: examples/index.qmd
      - text: Kernels
        href: kernels.qmd
      - text: Advanced
        href: advanced/index.qmd
      - text: Developers
        href: developers/index.qmd
      - text: Reference
        href: reference.qmd
      - text: News
        href: news.qmd
      - text: Cite
        href: cite.qmd
      - text: Coverage
        href: coverage.qmd
    right:
      - text: API Reference
        href: pkgdown/reference/index.html
      - text: Articles
        href: pkgdown/articles/index.html
      - icon: github
        href: "https://github.com/arnabaich96/DPmixGPD"

format:
  html:
    theme: [cosmo, theme.scss]
    toc: false
    smooth-scroll: true
    link-external-newwindow: true
    include-after-body: _footer.html

execute:
  enabled: false
  cache: true
  freeze: auto
