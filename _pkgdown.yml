url: https://arnabaich96.github.io/CausalMixGPD/pkgdown

destination: docs/pkgdown

build:
  lazy: false

articles:
  - title: "Articles"
    contents:
      - starts_with("01-introduction")
      - starts_with("02-one-arm")
      - starts_with("03-causal")
      - manuscript/CausalMixGPD_JSS_article

template:
  bootstrap: 5
  includes:
    in_header: null
  params:
    ganalytics: null

navbar:
  structure:
    left: [home, articles, reference]
    right: [github]

  components:
    articles:
      text: "Articles"
      menu:
        - text: "Introduction"
          href: articles/01-introduction.html
        - text: "One-Arm"
          href: articles/02-one-arm.html
        - text: "Causal"
          href: articles/03-causal.html

    github:
      text: "GitHub"
      href: https://github.com/arnabaich96/CausalMixGPD

