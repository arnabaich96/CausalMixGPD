url: https://arnabaich96.github.io/DPmixGPD/pkgdown

destination: docs/pkgdown

build:
  lazy: false

articles:
  - title: "Articles"
    contents:
      - "basic-01"
      - "model-spec-02"
      - "unconditional-03"
      - "conditional-04"
      - "causal-05"

template:
  bootstrap: 5
  includes:
    in_header: null
  params:
    ganalytics: null

navbar:
  structure:
    left: [home, articles, reference]
    right: [github]

  components:
    articles:
      text: "Articles"
      menu:
        - text: "Model specification"
          href: articles/basic-01.html
        - text: "Model fundamentals"
          href: articles/model-spec-02.html
        - text: "Unconditional"
          href: articles/unconditional-03.html
        - text: "Conditional"
          href: articles/conditional-04.html
        - text: "Causal"
          href: articles/causal-05.html

    github:
      text: "GitHub"
      href: https://github.com/arnabaich96/DPmixGPD

