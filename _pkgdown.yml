url: https://arnabaich96.github.io/CausalMixGPD/pkgdown

destination: docs/pkgdown

development:
  mode: unreleased

build:
  lazy: false

template:
  bootstrap: 5
  includes:
    in_header: null
  params:
    ganalytics: null

home:
