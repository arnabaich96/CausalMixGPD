url: https://arnabaich96.github.io/DPmixGPD/pkgdown

destination: docs/pkgdown

build:
  lazy: false

template:
  bootstrap: 5
  includes:
    in_header: null
  params:
    ganalytics: null

navbar:
  structure:
    left: [home, articles, reference]
    right: [github]

  components:
    articles:
      text: "Articles"
      menu:
        - text: "Manual"
          href: articles/manual.html
        - text: "Introduction"
          href: articles/introduction.html
        - text: "Distributions"
          href: articles/distributions.html
        - text: "Model specification"
          href: articles/model-spec.html
        - text: "MCMC workflow"
          href: articles/mcmc-workflow.html
        - text: "Unconditional"
          href: articles/unconditional.html
        - text: "Conditional"
          href: articles/conditional.html
        - text: "Causal"
          href: articles/causal.html
        - text: "Backends"
          href: articles/backends.html
        - text: "S3 methods reference"
          href: articles/reference-s3.html

    github:
      text: "GitHub"
      href: https://github.com/arnabaich96/DPmixGPD
