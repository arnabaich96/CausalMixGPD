name: check-and-deploy

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      RSTUDIO_PANDOC: "${{ runner.workspace }}/pandoc-3.1.11/bin/pandoc"
    steps:
      - uses: actions/checkout@v4
      - name: Install R
        uses: r-lib/actions/setup-r@v3
        with:
          r-version: "4.5.2"
      - name: Install pandoc
        uses: r-lib/actions/setup-pandoc@v3
        with:
          version: "3.1.11"
      - name: Restore renv
        run: Rscript -e "if (requireNamespace('renv', quietly = TRUE)) renv::restore(lockfile = 'renv.lock')" 
      - name: Install dependencies
        run: Rscript -e "if (requireNamespace('remotes', quietly = TRUE)) remotes::install_deps(dependencies = TRUE)"
      - name: Run coverage status helper
        run: Rscript tools/update_coverage_status.R
      - name: Run R CMD check
        run: Rscript -e "devtools::check(args = c('--no-manual', '--as-cran'))"

  deploy-pkgdown:
    runs-on: ubuntu-latest
    needs: check
    env:
      RSTUDIO_PANDOC: "${{ runner.workspace }}/pandoc-3.1.11/bin/pandoc"
    steps:
      - uses: actions/checkout@v4
      - name: Install R
        uses: r-lib/actions/setup-r@v3
        with:
          r-version: "4.5.2"
      - name: Install pandoc
        uses: r-lib/actions/setup-pandoc@v3
        with:
          version: "3.1.11"
      - name: Restore renv
        run: Rscript -e "if (requireNamespace('renv', quietly = TRUE)) renv::restore(lockfile = 'renv.lock')" 
      - name: Build pkgdown site
        run: Rscript -e "pkgdown::deploy_site_github_pages(overwrite = TRUE)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
