name: coverage

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  covr:
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::jsonlite
          needs: coverage

      - name: Run coverage report (upload on push)
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          Rscript -e "source('tools/.Rscripts/coverage.R'); cov <- coverage_report(sources = 'tests', test_level = 'ci', output_dir = 'docs/coverage', browse = FALSE); if (Sys.getenv('GITHUB_EVENT_NAME') == 'push') { ok <- coverage_upload(sources = 'tests', test_level = 'ci', coverage = cov, require_token = TRUE, quiet = FALSE); if (!isTRUE(ok)) quit(status = 1) } else { cat('Skipping Codecov upload for non-push event.\n') }"
