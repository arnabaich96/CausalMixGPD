name: R-CMD-check-and-coverage

on:
  push:
  pull_request:

jobs:
  check-coverage:
    runs-on: ubuntu-latest
    name: ubuntu-latest (R release)

    env:
      R_KEEP_PKG_SOURCE: yes
      RENV_CONFIG_CACHE_ENABLED: true

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libglpk-dev libglpk40 libpng-dev libx11-dev libcurl4-openssl-dev pkg-config

      - uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2

      - name: Install roxygen2 (if not in lockfile)
        run: Rscript -e 'if (!requireNamespace("roxygen2", quietly=TRUE)) install.packages("roxygen2")'

      - name: Regenerate Rd files
        run: Rscript -e 'roxygen2::roxygenise()'

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2

      - name: Install covr (if not in lockfile)
        run: Rscript -e 'if (!requireNamespace("covr", quietly=TRUE)) install.packages("covr")'

      - name: Generate coverage (Cobertura)
        run: |
          Rscript -e 'covr::package_coverage(type="tests") |> covr::to_cobertura(filename="coverage.xml")'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Dump testthat failure output
        if: failure()
        shell: bash
        run: |
          for f in $(find . -name 'testthat.Rout.fail'); do
            echo "=== $f ==="
            cat "$f"
          done

