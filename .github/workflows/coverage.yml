name: R-CMD-check-and-coverage

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest,   r: "release" }
          - { os: ubuntu-latest,   r: "devel" }
          - { os: macos-latest,    r: "release" }
          - { os: macos-latest,    r: "devel" }
          - { os: windows-latest,  r: "release" }
          - { os: windows-latest,  r: "devel" }

    env:
      R_KEEP_PKG_SOURCE: yes
      RENV_CONFIG_CACHE_ENABLED: true

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglpk-dev libglpk40 libpng-dev libx11-dev libcurl4-openssl-dev pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config curl

      # If you use renv.lock (enables caching)
      - uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2

      - name: Install roxygen2 (if not in lockfile)
        run: Rscript -e 'if (!requireNamespace("roxygen2", quietly=TRUE)) install.packages("roxygen2")'

      - name: Regenerate Rd files
        run: Rscript -e 'roxygen2::roxygenise()'

      - name: Install covr (if not in lockfile)
        run: Rscript -e 'if (!requireNamespace("covr", quietly=TRUE)) install.packages("covr")'

      # Run tests + generate coverage and upload to Codecov
      - name: Coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}  # needed for private repos; harmless for public
        shell: bash
        run: |
          Rscript -e "covr::codecov(quiet = FALSE, flags = paste0('${{ matrix.config.os }}','-R${{ matrix.config.r }}'), name = paste0('ci-','${{ matrix.config.os }}','-R','${{ matrix.config.r }}'))"

      # If something fails, print testthat.Rout.fail (saves your sanity)
      - name: Dump testthat failure output
        if: failure()
        shell: bash
        run: |
          for f in $(find . -name 'testthat.Rout.fail'); do
            echo "=== $f ==="
            cat "$f"
          done
