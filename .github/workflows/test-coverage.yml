name: Test and Coverage

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  test-coverage:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        r-version: ['4.3', '4.4', '4.5']

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      RSPM: ${{ matrix.config.rspm }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      # Set test level to "cran" for codecov runs to skip problematic tests
      DPMIXGPD_TEST_LEVEL: "cran"

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::covr
            any::devtools
            any::testthat
          needs: |
            check
            test-coverage

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install \
            curl \
            openssl \
            libxml2

      - name: Query dependencies
        run: |
          install.packages("remotes")
          saveRDS(remotes::dev_package_deps(dependencies = TRUE), ".github/depends.Rds", version = 2)
          writeLines(sprintf("R-%i.%i", getRversion()$major, getRversion()$minor), ".github/R-version")
        shell: Rscript {0}

      - name: Cache R packages
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-${{ matrix.r-version }}-${{ hashFiles('.github/depends.Rds') }}
          restore-keys: ${{ runner.os }}-${{ matrix.r-version }}-

      - name: Install dependencies
        run: |
          remotes::install_deps(dependencies = TRUE)
          remotes::install_cran("covr")
        shell: Rscript {0}

      - name: Check package
        run: |
          options(covr.gcov = NULL)
          devtools::check(document = FALSE, args = c("--no-manual", "--as-cran"), error_on = "error")
        shell: Rscript {0}

      - name: Test package
        run: |
          devtools::test()
        shell: Rscript {0}

      - name: Calculate and upload coverage
        run: |
          # Set test level to "cran" to skip problematic tests during codecov
          Sys.setenv(DPMIXGPD_TEST_LEVEL = "cran")
          Sys.setenv(COVERAGE = "1")
          
          # Calculate and upload coverage - continue even if some tests fail
          result <- tryCatch({
            cat("Calculating coverage (some test failures are acceptable)...\n")
            cov <- covr::package_coverage(type = "all", quiet = FALSE, pre_clean = FALSE)
            cat("Uploading coverage to codecov...\n")
            covr::codecov(coverage = cov, quiet = FALSE)
            TRUE
          }, error = function(e) {
            cat("Warning: Coverage calculation had issues, attempting direct upload...\n")
            tryCatch({
              covr::codecov(quiet = FALSE)
              TRUE
            }, error = function(e2) {
              cat("Coverage upload failed, but this is non-fatal.\n")
              FALSE
            })
          })
          
          if (!result) {
            cat("Coverage upload had issues, but workflow will continue.\n")
          }
        shell: Rscript {0}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true